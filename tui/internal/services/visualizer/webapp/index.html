<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skene — Journey Visualizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #E1E1E1;
      color: #141414;
    }

    .react-flow__node { font-family: inherit; }

    .badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 300;
      padding: 2px 0;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #FAF1E9;
    }

    /* Stage column header */
    .node-stage {
      background: #141414;
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.06);
      border-radius: 10px;
      padding: 22px 16px;
      min-width: 360px;
      max-width: 360px;
    }
    .node-stage > .badge {
      display: inline-block;
      margin-bottom: 8px;
    }
    .node-stage .node-title {
      font-size: 22px;
      font-weight: 400;
      color: #FAF1E9;
      margin-bottom: 6px;
    }
    .node-stage .node-subtitle {
      font-size: 12px;
      color: #737373;
      font-style: italic;
      margin-bottom: 10px;
    }
    .node-stage .node-meta {
      font-size: 11px;
      color: #737373;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Milestone card */
    .node-milestone {
      background: #ffffff;
      border: 1px solid #d0d7de;
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.06);
      border-radius: 10px;
      padding: 22px 16px;
      min-width: 360px;
      max-width: 360px;
    }
    .node-milestone .node-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .node-milestone .node-title {
      font-size: 14px;
      font-weight: 600;
      color: #1f2328;
      line-height: 1.3;
      flex: 1;
      min-width: 0;
    }
    .milestone-order {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #EFEFEF;
      border: 1px solid #D9D9D9;
      color: #4A4A4A;
      font-size: 11px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .node-milestone .node-desc {
      font-size: 12px;
      color: #656d76;
      line-height: 1.5;
      margin-bottom: 12px;
      padding-left: 28px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .node-milestone .node-meta {
      font-size: 11px;
      color: #656d76;
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-bottom: 8px;
      padding-left: 28px;
    }
    .node-milestone .evidence-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
      padding-left: 28px;
    }
    .evidence-chip {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .evidence-code { background: #ddf4ff; color: #0550ae; }
    .evidence-db   { background: #dafbe1; color: #116329; }
    .evidence-config { background: #fbefff; color: #6639ba; }

    /* Product banner */
    .node-product {
      background: #ffffff;
      border: 1px solid #d0d7de;
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.06);
      border-radius: 10px;
      padding: 12px 18px;
      min-width: 260px;
    }
    .node-product .node-title {
      font-size: 16px;
      font-weight: 700;
      color: #1f2328;
    }
    .node-product .node-meta {
      font-size: 11px;
      color: #656d76;
      margin-top: 4px;
    }

    /* Edge labels */
    .react-flow__edge-textbg { fill: #ffffff; }
    .react-flow__edge-text { fill: #656d76; font-size: 11px; }

    /* Handles */
    .react-flow__handle {
      width: 8px;
      height: 8px;
      background: #d0d7de;
      border: 2px solid #8c959f;
    }

    /* Floating nav - dark theme */
    .fnav {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 50;
      width: 200px;
      background: rgba(20, 20, 20, 0.80);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid #30363d;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .fnav__body {
      padding: 12px;
    }
    .fnav__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .fnav__logo {
      height: 18px;
      width: auto;
    }
    .fnav__workspace {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      margin-bottom: 4px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #FAF1E9;
      text-decoration: none;
      transition: background 150ms ease;
    }
    .fnav__workspace:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .fnav__workspace svg {
      width: 12px;
      height: 12px;
      color: #8b949e;
    }
    .fnav__items {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .fnav__item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: #FAF1E9;
      text-decoration: none;
      transition: background 150ms ease;
    }
    .fnav__item:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .fnav__item.is-active {
      background: rgba(255, 255, 255, 0.15);
      color: #FAF1E9;
    }
    .fnav__item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .fnav__label {
      padding: 8px 10px 4px;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #8b949e;
    }
    .fnav__divider {
      height: 1px;
      background: #30363d;
      margin: 6px 0;
    }
    .fnav__expand {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 200ms ease-in-out;
    }
    .fnav.is-open .fnav__expand {
      grid-template-rows: 1fr;
    }
    .fnav__inner {
      overflow: hidden;
    }
    .fnav__toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 6px 0;
      margin-top: 4px;
      border: none;
      background: none;
      cursor: pointer;
      color: #8b949e;
      transition: color 150ms ease;
    }
    .fnav__toggle:hover {
      color: #FAF1E9;
    }
    .fnav__toggle svg {
      width: 16px;
      height: 16px;
      transition: transform 200ms ease;
    }
    .fnav.is-open .fnav__toggle svg {
      transform: rotate(180deg);
    }
  </style>
</head>

  <div id="root" style="width:100vw;height:100vh"></div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "@xyflow/react": "https://esm.sh/@xyflow/react@12.10.2?external=react,react-dom"
    }
  }
  </script>

  <link rel="stylesheet" href="https://esm.sh/@xyflow/react@12.10.2/dist/style.css" />

  <script type="module">
    import React, { memo, useEffect, useMemo, useState } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      ReactFlow, Background, Controls, MiniMap, Handle, Position,
    } from '@xyflow/react';

    const h = React.createElement;

    const ProductNode = memo(function ProductNode({ data }) {
      return h('div', { className: 'node-product' },
        h('div', { className: 'node-title' }, data.name),
        data.generatedAt ? h('div', { className: 'node-meta' }, `Generated ${data.generatedAt}`) : null,
        data.layerLabel ? h('div', { className: 'node-meta', style: { marginTop: 4 } }, data.layerLabel) : null,
      );
    });

    const StageNode = memo(function StageNode({ data }) {
      return h('div', { className: 'node-stage' },
        h(Handle, { type: 'source', position: Position.Right }),
        h(Handle, { type: 'target', position: Position.Left }),
        h(Handle, { type: 'source', position: Position.Bottom, id: 'milestones' }),
        h('span', { className: `badge badge-stage-${data.stageId || 'discovery'}` }, data.stageId),
        h('div', { className: 'node-title' }, data.name),
        data.subtitle ? h('div', { className: 'node-subtitle' }, data.subtitle) : null,
        h('div', { className: 'node-meta' },
          data.layerLabel ? h('span', null, data.layerLabel) : null,
          h('span', { style: { marginLeft: 'auto' } }, `${data.count} milestone${data.count === 1 ? '' : 's'}`),
        ),
      );
    });

    const MilestoneNode = memo(function MilestoneNode({ data }) {
      return h('div', { className: 'node-milestone' },
        h(Handle, { type: 'target', position: Position.Top }),
        h(Handle, { type: 'source', position: Position.Bottom }),
        h('div', { className: 'node-header' },
          data.order != null ? h('span', { className: 'milestone-order' }, data.order) : null,
          h('span', { className: 'node-title' }, data.name),
        ),
        data.description ? h('div', { className: 'node-desc' }, data.description) : null,
        data.trackedEvent ? h('div', { className: 'node-meta' }, `event: ${data.trackedEvent}`) : null,
        typeof data.confidence === 'number'
          ? h('div', { className: 'node-meta' }, `confidence: ${data.confidence.toFixed(2)}`)
          : null,
        data.evidence && data.evidence.length
          ? h('div', { className: 'evidence-list' },
              ...data.evidence.map((ev, i) => h('span', {
                key: i,
                className: `evidence-chip evidence-${ev.source}`,
                title: ev.reason || '',
              }, ev.label)),
            )
          : null,
      );
    });

    const nodeTypes = { product: ProductNode, stage: StageNode, milestone: MilestoneNode };
    const defaultEdgeOptions = { type: 'smoothstep' };

    // journey.yaml shape:
    //   product.{name, generated_at, ...}
    //   layers[].{id, name, spans_stages: [stage_id, ...]}
    //   stages[].{id, order, name, subtitle, milestones[], kpis[]}
    //     milestones[].{id, order, name, description, evidence[], tracked_event, confidence}
    //       evidence[].{source: code|db|config, reason, path?, table?}
    //   connectors[]  (empty in v1)
    function buildGraph(doc) {
      const nodes = [];
      const edges = [];
      const stages = (doc?.stages || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));
      const layers = doc?.layers || [];
      const product = doc?.product || {};

      // Map each stage_id -> layer name so we can show grouping.
      const layerByStage = {};
      layers.forEach((layer) => {
        (layer.spans_stages || []).forEach((sid) => {
          layerByStage[sid] = layer.name || layer.id;
        });
      });

      const COL_WIDTH = 380;
      const STAGE_Y = 0;
      const MILESTONE_BASE_Y = 160;
      const MILESTONE_GAP = 240;

      // Product banner sits left of the first stage column.
      nodes.push({
        id: '__product',
        type: 'product',
        position: { x: -COL_WIDTH, y: STAGE_Y },
        data: {
          name: product.name || 'Product',
          generatedAt: product.generated_at || '',
          layerLabel: layers.length ? `${layers.length} layer${layers.length === 1 ? '' : 's'}, ${stages.length} stage${stages.length === 1 ? '' : 's'}` : '',
        },
      });

      stages.forEach((stage, stageIdx) => {
        const x = stageIdx * COL_WIDTH;
        const milestones = stage.milestones || [];
        const stageNodeId = `stage__${stage.id}`;

        nodes.push({
          id: stageNodeId,
          type: 'stage',
          position: { x, y: STAGE_Y },
          data: {
            stageId: stage.id,
            name: stage.name || stage.id,
            subtitle: stage.subtitle || '',
            layerLabel: layerByStage[stage.id] || '',
            count: milestones.length,
          },
        });

        // Horizontal edge: stage -> next stage (left-to-right funnel).
        if (stageIdx > 0) {
          const prev = stages[stageIdx - 1];
          edges.push({
            id: `e-stage-${prev.id}-${stage.id}`,
            source: `stage__${prev.id}`,
            target: stageNodeId,
            style: { stroke: '#4A4A4A', strokeWidth: 1.5 },
          });
        }

        let prevMilestoneId = null;
        milestones
          .slice()
          .sort((a, b) => (a.order || 0) - (b.order || 0))
          .forEach((m, i) => {
            const id = `m__${stage.id}__${m.id}`;
            nodes.push({
              id,
              type: 'milestone',
              position: { x, y: MILESTONE_BASE_Y + i * MILESTONE_GAP },
              data: {
                stageId: stage.id,
                order: m.order,
                name: m.name || m.id,
                description: m.description || '',
                trackedEvent: m.tracked_event || '',
                confidence: typeof m.confidence === 'number' ? m.confidence : undefined,
                evidence: (m.evidence || []).map((ev) => ({
                  source: ev.source || 'code',
                  label: ev.path || ev.table || ev.source || '',
                  reason: ev.reason || '',
                })),
              },
            });

            // Vertical edge: stage -> first milestone, then milestone -> milestone.
            const sourceId = prevMilestoneId || stageNodeId;
            const sourceHandle = prevMilestoneId ? undefined : 'milestones';
            edges.push({
              id: `e-${sourceId}-${id}`,
              source: sourceId,
              sourceHandle,
              target: id,
              style: { stroke: '#4A4A4A20', strokeWidth: 1.5 },
            });
            prevMilestoneId = id;
          });
      });

      return { nodes, edges };
    }

    function App() {
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch('/api/data')
          .then(r => { if (!r.ok) throw new Error('Failed to load'); return r.json(); })
          .then(d => setResult(d))
          .catch(e => setError(e.message));
      }, []);

      const graph = useMemo(() => (result ? buildGraph(result.data) : null), [result]);

      if (error) return h('div', { style: { padding: 40, color: '#cf222e' } }, 'Error: ' + error);
      if (!graph) return h('div', { style: { padding: 40, color: '#656d76' } }, 'Loading\u2026');

      return h('div', { style: { width: '100vw', height: '100vh' } },
        h(ReactFlow, {
          defaultNodes: graph.nodes,
          defaultEdges: graph.edges,
          nodeTypes,
          fitView: true,
          colorMode: 'light',
          minZoom: 0.3,
          defaultEdgeOptions,
          proOptions: { hideAttribution: true },
          nodesDraggable: false,
          nodesConnectable: false,
          edgesReconnectable: false,
          elementsSelectable: false,
        },
          h(Background, { gap: 20, size: 2, color: '#C7C7C7' }),
          h(Controls, { showInteractive: false }),
          h(MiniMap, {
            nodeColor: '#d0d7de',
            maskColor: 'rgba(246, 248, 250, 0.85)',
            style: { background: '#f6f8fa' },
          }),
        )
      );
    }

    createRoot(document.getElementById('root')).render(h(App));
  </script>

  <!-- Floating nav behavior -->
  <script>
    (function() {
      var nav = document.getElementById('floatingNav');
      var toggle = document.getElementById('navToggle');

      toggle.addEventListener('click', function() {
        var isOpen = nav.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', isOpen);
      });
    })();
  </script>
</body>
